<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AffiliPrompt AI V2</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen">

<div class="max-w-5xl mx-auto p-6">

<h1 class="text-4xl font-bold text-center text-emerald-400 mb-4">
AffiliPrompt AI
</h1>

<p class="text-center text-slate-300 mb-8">
Upload Produk, Model dan Tempat
</p>

<div class="bg-slate-800 p-6 rounded-3xl">

<div class="mb-4">
<label>Foto Produk</label>
<input type="file" class="w-full mt-2">
</div>

<div class="mb-4">
<label>Foto Model</label>
<input type="file" class="w-full mt-2">
</div>


<div class="mb-4">
<label>Ratio Video</label>
<select id="ratio" class="w-full p-3 rounded text-black">
<option>9:16</option>
<option>16:9</option>
<option>1:1</option>
<option>4:5</option>
</select>
</div>

<div class="mb-4">
<label>Kategori Affiliate</label>
<select id="category" class="w-full p-3 rounded text-black">
<option>Fashion</option>
<option>Beauty</option>
<option>Skincare</option>
<option>Makeup</option>
<option>Elektronik</option>
<option>Gadget</option>
<option>Aksesoris HP</option>
<option>Jam Tangan</option>
<option>Sepatu</option>
<option>Tas</option>
<option>Rumah Tangga</option>
<option>Dapur</option>
<option>Furniture</option>
<option>Otomotif</option>
<option>Kesehatan</option>
<option>Fitness</option>
<option>Makanan</option>
<option>Minuman</option>
<option>Properti</option>
<option>Ebook</option>
<option>Kursus Online</option>
</select>
</div>

<div class="mb-4">

<label>Lokasi Scene</label>

<select
id="location"
class="w-full p-3 rounded text-black">

<option>Otomatis AI</option>

<option>Dalam Ruangan</option>
<option>Luar Ruangan</option>

<option>Kamar Tidur</option>
<option>Ruang Tamu</option>
<option>Dapur Modern</option>

<option>Kantor</option>
<option>Cafe</option>
<option>Mall</option>

<option>Studio</option>
<option>Taman</option>
<option>Pantai</option>

<option>Jalan Kota</option>
<option>Gym</option>
<option>Restoran</option>

<option>Showroom</option>
<option>Toko Retail</option>

</select>

</div>

<button
onclick="generateAI()"
class="w-full bg-emerald-500 py-4 rounded-xl font-bold">
GENERATE AI
</button>

</div>

</div>

<script>
function generateAI(){

const kategori =
document.getElementById("category").value;

const lokasi =
document.getElementById("location").value;

const ratio =
document.getElementById("ratio").value;

let hasil = "";

if(kategori === "Jam Tangan"){

hasil = `
⌚ STORYBOARD JAM TANGAN

📸 PROMPT GAMBAR 1
Luxury watch on male wrist,
business outfit,
premium office background,
cinematic lighting,
ultra realistic,
8k detail.

📸 PROMPT GAMBAR 2
Close up watch dial,
luxury photography,
high detail,
professional lighting.

📸 PROMPT GAMBAR 3
Business man checking time,
premium lifestyle,
shallow depth of field.

📸 PROMPT GAMBAR 4
Product showcase,
luxury watch on table,
commercial advertising shot.

🎥 PROMPT VIDEO 1
Camera push in,
watch reveal,
cinematic movement.

🎥 PROMPT VIDEO 2
Close up rotating watch,
luxury lighting.

🎥 PROMPT VIDEO 3
Model checking time,
slow motion.

🎥 PROMPT VIDEO 4
Product hero shot,
commercial ending scene.
`;

}

else if(kategori === "Fashion"){

hasil = `
👕 STORYBOARD FASHION

📸 PROMPT GAMBAR 1
Fashion model posing,
streetwear style,
${lokasi},
ultra realistic.

📸 PROMPT GAMBAR 2
Full body outfit showcase,
cinematic lighting.

📸 PROMPT GAMBAR 3
Walking shot,
viral TikTok style.

📸 PROMPT GAMBAR 4
Close up fabric details.

🎥 PROMPT VIDEO 1
Model walking confidently.

🎥 PROMPT VIDEO 2
Outfit transition effect.

🎥 PROMPT VIDEO 3
Close up clothing details.

🎥 PROMPT VIDEO 4
Final CTA fashion showcase.
`;

}

else if(kategori === "Beauty"){

hasil = `
💄 STORYBOARD BEAUTY

📸 PROMPT GAMBAR 1
Beautiful woman skincare routine,
soft lighting.

📸 PROMPT GAMBAR 2
Applying beauty product.

📸 PROMPT GAMBAR 3
Glowing skin close up.

📸 PROMPT GAMBAR 4
Premium product showcase.

🎥 PROMPT VIDEO 1
Beauty routine.

🎥 PROMPT VIDEO 2
Product application.

🎥 PROMPT VIDEO 3
Before after effect.

🎥 PROMPT VIDEO 4
Final CTA scene.
`;

}

else{

hasil = `
🎬 STORYBOARD AFFILIATE AI

Kategori: ${kategori}

Ratio: ${ratio}

Lokasi: ${lokasi}

📸 PROMPT GAMBAR 1
Professional product photography,
${lokasi},
${ratio},
ultra realistic.

📸 PROMPT GAMBAR 2
Close up product shot.

📸 PROMPT GAMBAR 3
Lifestyle usage scene.

📸 PROMPT GAMBAR 4
Commercial advertising scene.

🎥 PROMPT VIDEO 1
Product reveal.

🎥 PROMPT VIDEO 2
Feature showcase.

🎥 PROMPT VIDEO 3
Lifestyle scene.

🎥 PROMPT VIDEO 4
CTA ending scene.
`;

}

document.getElementById("result").textContent = hasil;

document.getElementById("resultBox")
.classList.remove("hidden");
}
</script>

<div
id="resultBox"
class="hidden mt-5 bg-slate-800 p-4 rounded-xl">

<h3 class="font-bold mb-3">
Hasil Generate
</h3>

<pre id="result"
class="whitespace-pre-wrap"></pre>

</div>
</body>
</html>
