<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AffiliPrompt AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#0f172a;
}
.glow{
    box-shadow:0 0 30px rgba(34,197,94,.3);
}
</style>

</head>
<body class="min-h-screen text-white">

<div class="max-w-5xl mx-auto p-5">

    <div class="text-center py-10">

        <h1 class="text-4xl font-bold text-emerald-400">
            AffiliPrompt AI
        </h1>

        <p class="text-slate-300 mt-3">
            Generator Prompt Affiliate TikTok Otomatis
        </p>

    </div>

    <div class="bg-slate-800 rounded-3xl p-6 glow">

        <h2 class="text-xl font-bold mb-4">
            Data Produk
        </h2>

        <input
            id="productName"
            type="text"
            placeholder="Nama Produk"
            class="w-full p-4 rounded-xl text-black mb-4"
        >

        <textarea
            id="productDesc"
            placeholder="Deskripsi Produk"
            class="w-full p-4 rounded-xl text-black mb-4 h-32"
        ></textarea>

        <button
            onclick="generatePrompt()"
            class="w-full bg-emerald-500 hover:bg-emerald-600 py-4 rounded-xl font-bold"
        >
            Generate Prompt
        </button>

    </div>

    <div
        id="resultBox"
        class="hidden mt-6 bg-slate-800 rounded-3xl p-6"
    >

        <div class="flex justify-between items-center">

            <h2 class="font-bold text-xl">
                Hasil Prompt
            </h2>

            <button
                onclick="copyPrompt()"
                class="bg-blue-500 px-4 py-2 rounded-xl"
            >
                Copy
            </button>

        </div>

        <pre
            id="result"
            class="mt-4 whitespace-pre-wrap"
        ></pre>

    </div>

</div>

<script>

function generatePrompt(){

    let name =
        document.getElementById('productName').value;

    let desc =
        document.getElementById('productDesc').value;

    if(!name){
        alert('Masukkan nama produk');
        return;
    }

    let prompt = `
🎬 HOOK

"Pernah lihat ${name} yang lagi viral ini?"

🔥 MASALAH

Banyak orang belum tahu manfaat sebenarnya.

✅ SOLUSI

${desc}

🎥 VISUAL

Close up produk
Lighting profesional
Kamera bergerak perlahan
Format vertikal 9:16

📢 CTA

Klik keranjang kuning sekarang sebelum kehabisan.
`;

    document.getElementById('resultBox')
        .classList.remove('hidden');

    document.getElementById('result')
        .innerText = prompt;

}

function copyPrompt(){

    let text =
        document.getElementById('result').innerText;

    navigator.clipboard.writeText(text);

    alert('Prompt berhasil disalin');

}

</script>

</body>
</html>
