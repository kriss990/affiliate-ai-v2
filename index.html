<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AffiliPrompt AI V2</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen">

<div class="max-w-5xl mx-auto p-6">

<h1 class="text-4xl font-bold text-center text-emerald-400 mb-4">
AffiliPrompt AI
</h1>

<p class="text-center text-slate-300 mb-8">
Upload Produk, Model dan Tempat
</p>

<div class="bg-slate-800 p-6 rounded-3xl">

<div class="mb-4">
<label>Foto Produk</label>
<input type="file" class="w-full mt-2">
</div>

<div class="mb-4">
<label>Foto Model</label>
<input type="file" class="w-full mt-2">
</div>

<div class="mb-4">
<label>Foto Tempat</label>
<input type="file" class="w-full mt-2">
</div>

<div class="mb-4">
<label>Ratio Video</label>
<select class="w-full p-3 rounded text-black">
<option>9:16</option>
<option>16:9</option>
<option>1:1</option>
<option>4:5</option>
</select>
</div>

<div class="mb-4">
<label>Kategori Affiliate</label>
<select class="w-full p-3 rounded text-black">
<option>Fashion</option>
<option>Beauty</option>
<option>Elektronik</option>
<option>Rumah Tangga</option>
</select>
</div>

<div class="mb-4">
<label>Jenis Video</label>
<select class="w-full p-3 rounded text-black">
<option>UGC Creator</option>
<option>Storytelling</option>
<option>Review Produk</option>
<option>Soft Selling</option>
</select>
</div>

<button
class="w-full bg-emerald-500 py-4 rounded-xl font-bold">
GENERATE AI
</button>

</div>

</div>

</body>
</html>
