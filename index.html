<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AffiliPrompt AI V2</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen">

<div class="max-w-5xl mx-auto p-6">

<h1 class="text-4xl font-bold text-center text-emerald-400 mb-4">
AffiliPrompt AI
</h1>

<p class="text-center text-slate-300 mb-8">
Upload Produk, Model dan Tempat
</p>

<div class="bg-slate-800 p-6 rounded-3xl">

<div class="mb-4">
<label>Foto Produk</label>
<input type="file" class="w-full mt-2">
</div>

<div class="mb-4">
<label>Foto Model</label>
<input type="file" class="w-full mt-2">
</div>

<div class="mb-4">
<label>Foto Tempat</label>
<input type="file" class="w-full mt-2">
</div>

<div class="mb-4">
<label>Ratio Video</label>
<select class="w-full p-3 rounded text-black">
<option>9:16</option>
<option>16:9</option>
<option>1:1</option>
<option>4:5</option>
</select>
</div>

<div class="mb-4">
<label>Kategori Affiliate</label>
<select class="w-full p-3 rounded text-black">
<option>Fashion</option>
<option>Beauty</option>
<option>Elektronik</option>
<option>Rumah Tangga</option>
</select>
</div>

<div class="mb-4">

<label>Lokasi Scene</label>

<select
id="location"
class="w-full p-3 rounded text-black">

<option>Otomatis AI</option>

<option>Dalam Ruangan</option>
<option>Luar Ruangan</option>

<option>Kamar Tidur</option>
<option>Ruang Tamu</option>
<option>Dapur Modern</option>

<option>Kantor</option>
<option>Cafe</option>
<option>Mall</option>

<option>Studio</option>
<option>Taman</option>
<option>Pantai</option>

<option>Jalan Kota</option>
<option>Gym</option>
<option>Restoran</option>

<option>Showroom</option>
<option>Toko Retail</option>

</select>

</div>

<button
onclick="generateAI()"
class="w-full bg-emerald-500 py-4 rounded-xl font-bold">
GENERATE AI
</button>

</div>

</div>
<div
id="result"
class="hidden max-w-5xl mx-auto mt-6 bg-slate-800 p-6 rounded-3xl">
</div>

<script>

function generateAI(){

const category =
document.getElementById("category").value;

const location =
document.getElementById("location").value;

const result =
document.getElementById("result");

result.classList.remove("hidden");

result.innerHTML = `

<h2 class="text-2xl font-bold mb-4">
🎬 Storyboard AI
</h2>

<div class="space-y-3">

<div class="bg-slate-700 p-4 rounded">
🎯 Scene 1 - Hook
</div>

<div class="bg-slate-700 p-4 rounded">
🔥 Scene 2 - Problem
</div>

<div class="bg-slate-700 p-4 rounded">
✅ Scene 3 - Solution
</div>

<div class="bg-slate-700 p-4 rounded">
📢 Scene 4 - CTA
</div>

</div>

<div class="mt-4 p-4 bg-slate-900 rounded">

<p>Kategori: ${category}</p>

<p>Lokasi: ${location}</p>

</div>

`;

}

</script>
<script>
function generateAI(){

let kategori =
document.getElementById('category').value;

let lokasi =
document.getElementById('location').value;

let ratio =
document.getElementById('ratio').value;

let hasil = `
🎬 STORYBOARD AFFILIATE AI

Kategori:
${kategori}

Ratio:
${ratio}

Lokasi:
${lokasi}

SCENE 1
Hook viral produk

SCENE 2
Masalah yang sering dialami pengguna

SCENE 3
Produk muncul sebagai solusi

SCENE 4
Close up detail produk

📸 PROMPT GAMBAR GEMINI OMNI

Ultra realistic product photography,
professional lighting,
${lokasi},
${ratio},
affiliate marketing style,
cinematic,
high detail,
8k quality.

🎥 PROMPT VIDEO

Camera push in,
slow motion,
product showcase,
cinematic lighting,
viral tiktok style.
`;

document.getElementById("result").innerText = hasil;

document.getElementById("resultBox")
.classList.remove("hidden");
}
</script>
<div
id="resultBox"
class="hidden mt-5 bg-slate-800 p-4 rounded-xl">

<h3 class="font-bold mb-3">
Hasil Generate
</h3>

<pre id="result"
class="whitespace-pre-wrap"></pre>

</div>
</body>
</html>
